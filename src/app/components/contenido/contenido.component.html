
    <table  class="table table-hover mt-10">
      <thead>
        <tr>
          <td class="col-2" style="font-weight: bold;">Nombre</td>
          <td class="col-2" style="font-weight: bold;">Ticker</td>
          <td class="col-2" style="font-weight: bold;">Precio</td>
          <td class="col-2" style="font-weight: bold;">Número de acciones</td>
          <td class="col-2" style="font-weight: bold;">PER</td>
          <td class="col-2" style="font-weight: bold;">Total invertido</td>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let Empresa of listEmpresas">
          <td>{{ Empresa.nombre }}</td>
          <td>{{ Empresa.ticker | uppercase}}</td>
          <td>{{ Empresa.precio }}</td>
          <td>{{ Empresa.acciones }}</td>
          <td>{{ Empresa.per }}</td>
          <td>{{ Empresa.invertido }}</td>
          <td>
            <button class="btn btn-primary btn-sm float-end">Editar</button>
          </td>
          <td>
            <button class="btn btn-danger btn-sm float-end" (ngClick)="eliminarAccion(Empresa);">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  
<button style="margin-left:10px;" class="btn btn-primary btn-sm float-end" [routerLink]="['editar-acciones']">Añadir acción</button>

   
<div *ngIf="listEmpresas.length == 0" style="margin-top:100px;margin: 1%;">
        <h5>No hay acciones introducidas</h5>
    </div>
